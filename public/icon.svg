<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- Fondo con gradiente sutil -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>

  <!-- Anillas de encuadernación -->
  <rect x="52" y="34" width="8" height="20" rx="4" fill="#334155"/>
  <rect x="92" y="34" width="8" height="20" rx="4" fill="#334155"/>
  <rect x="132" y="34" width="8" height="20" rx="4" fill="#334155"/>

  <!-- Cuerpo del calendario -->
  <rect x="26" y="46" width="140" height="124" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>

  <!-- Barra superior ámbar (mes) -->
  <rect x="26" y="46" width="140" height="30" rx="14" fill="#f59e0b"/>
  <rect x="26" y="60" width="140" height="16" fill="#f59e0b"/>

  <!-- Líneas de grilla sutiles -->
  <line x1="72" y1="90" x2="72" y2="166" stroke="#334155" stroke-width="1.5"/>
  <line x1="120" y1="90" x2="120" y2="166" stroke="#334155" stroke-width="1.5"/>
  <line x1="26" y1="128" x2="166" y2="128" stroke="#334155" stroke-width="1.5"/>

  <!-- Días marcados (descanso) -->
  <circle cx="50" cy="110" r="9" fill="#34d399" opacity="0.9"/>
  <circle cx="96" cy="110" r="9" fill="#34d399" opacity="0.9"/>
  <circle cx="142" cy="110" r="9" fill="#34d399" opacity="0.9"/>
  <circle cx="73" cy="148" r="9" fill="#34d399" opacity="0.9"/>

  <!-- Sutil brillo en la primera anilla -->
  <rect x="54" y="36" width="4" height="16" rx="2" fill="#475569"/>
</svg>
